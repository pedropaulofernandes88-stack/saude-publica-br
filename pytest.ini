[pytest]
minversion = 7.0
addopts =
    -ra
    --strict-markers
    --tb=short
    --import-mode=importlib
    -q

testpaths =
    tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Pure unit tests with no I/O (fast, no external deps)
    integration: Tests that require a real DB or external service
    api: Tests targeting the FastAPI application layer
    validation: Tests for Great Expectations validation suites
    ingestion: Tests for ingestion utilities and pipeline helpers
    slow: Tests that take more than 2 seconds

filterwarnings =
    ignore::DeprecationWarning:great_expectations.*
    ignore::UserWarning:great_expectations.*
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

asyncio_mode = auto
log_cli = false
log_level = WARNING
