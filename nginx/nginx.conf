# ============================================================
# nginx/nginx.conf
# saude-publica-br — Produção
#
# Funcionalidades:
#   • HTTP → HTTPS redirect (porta 80 → 443)
#   • SSL/TLS termination (TLS 1.2/1.3)
#   • Rate limiting por IP (10 req/s, burst=20)
#   • Reverse proxy: /api/* → FastAPI, /* → Next.js
#   • Gzip compression
#   • Security headers (HSTS, X-Frame, CSP, etc.)
#   • stub_status para scraping do Prometheus
#
# Para usar Let's Encrypt em produção:
#   1. Instale certbot: apt install certbot python3-certbot-nginx
#   2. Obtenha certificados: certbot --nginx -d seu-dominio.com
#   3. Ajuste ssl_certificate / ssl_certificate_key abaixo
#   4. Uncomment o bloco de renovação automática
# ============================================================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;  # esconde versão do nginx

    # ── Gzip ─────────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length 1024;

    # ── Rate limiting ─────────────────────────────────────────────────────────────
    # Zona global: 10 MB de memória → suporta ~160 mil IPs únicos
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=global_limit:10m rate=30r/s;
    limit_req_status 429;

    # ── Upstreams ─────────────────────────────────────────────────────────────────
    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream frontend_backend {
        server frontend:3000;
        keepalive 16;
    }

    # ── Redirect HTTP → HTTPS ─────────────────────────────────────────────────────
    server {
        listen 80;
        server_name saudeemdado.com www.saudeemdado.com;

        # Health check do nginx (para o docker healthcheck via HTTP)
        location /nginx-health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # Tudo mais: redireciona para HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS principal ───────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name saudeemdado.com www.saudeemdado.com;

        # ── SSL ──────────────────────────────────────────────────────────────────
        # Self-signed (desenvolvimento). Em produção substitua pelos paths do certbot:
        ssl_certificate     /etc/letsencrypt/live/saudeemdado.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/saudeemdado.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # ── Security headers ──────────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # ── Tamanho máximo de payload ─────────────────────────────────────────────
        client_max_body_size 10M;

        # ── Timeouts ──────────────────────────────────────────────────────────────
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # ── Proxy headers padrão ──────────────────────────────────────────────────
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # ── /api/ → FastAPI ───────────────────────────────────────────────────────
        # Reescreve /api/foo → /foo no backend
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://api_backend;

            # Aumenta timeout para endpoints de dados pesados
            proxy_read_timeout 120s;
        }

        # Docs da API (sem strip de prefixo, acessível em /api/docs)
        location ~ ^/api/(docs|redoc|openapi\.json)$ {
            rewrite ^/api/(.*)$ /$1 break;
            proxy_pass http://api_backend;
        }

        # ── /metrics (Prometheus scraping da API) ─────────────────────────────────
        # Restrito a rede interna — bloquear em produção se Prometheus não estiver na mesma rede
        location /metrics {
            allow 172.0.0.0/8;   # redes Docker internas
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;

            proxy_pass http://api_backend/metrics;
        }

        # ── stub_status (métricas do nginx para Prometheus) ───────────────────────
        location /nginx-status {
            stub_status on;
            access_log off;
            allow 172.0.0.0/8;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
        }

        # ── Health check ──────────────────────────────────────────────────────────
        location /health {
            access_log off;
            proxy_pass http://api_backend/health;
        }

        # ── / → Next.js frontend ─────────────────────────────────────────────────
        location / {
            limit_req zone=global_limit burst=50 nodelay;
            proxy_pass http://frontend_backend;

            # WebSocket support (Next.js HMR em dev)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Assets estáticos — cache longo ───────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map)$ {
            proxy_pass http://frontend_backend;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Next.js _next/static ─────────────────────────────────────────────────
        location /_next/static/ {
            proxy_pass http://frontend_backend;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }
    }
}
